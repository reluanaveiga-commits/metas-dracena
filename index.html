<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Controle de Metas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>

<body>
   <div id="loginScreen" class="login">
    <div class="login-box">

        <h2>Login</h2>

        <input type="text" id="usuario" placeholder="Usuário">
        <input type="password" id="senha" placeholder="Senha">

        <button onclick="entrar()">Entrar</button>

        <p id="erro"></p>

    </div>
</div>
<div id="app" style="display:none;">

    <!-- HEADER -->
    <header class="topo">
        <div class="brand">
            <img src="logo.png" alt="Logo" class="logo">
            <div>
                <h1>Controle de Metas</h1>
                <span>Sistema de gestão de vendas</span>
            </div>
        </div>
    </header>

    <main class="container">

        <div class="grid">

            <!-- CIDADE -->
            <div class="card">
                <h3>Cidade</h3>
                <select id="cidade">
                    <option value="">Selecione a cidade</option>
                    <option value="Dracena">Dracena</option>
                    <option value="Panorama">Panorama</option>
                    <option value="Tupi Paulista">Tupi Paulista</option>
                    <option value="Junqueirópolis">Junqueirópolis</option>
                    <option value="Ikeda">Ikeda</option>
                    <option value="Paulicéia">Paulicéia</option>
                </select>
            </div>
 <!-- SELECIONAR MES/ANO -->
           <div class="card">
    <h3>Período</h3>

    <label>Mês:</label>
    <select id="mesSelecionado">
        <option value="0">Janeiro</option>
        <option value="1">Fevereiro</option>
        <option value="2">Março</option>
        <option value="3">Abril</option>
        <option value="4">Maio</option>
        <option value="5">Junho</option>
        <option value="6">Julho</option>
        <option value="7">Agosto</option>
        <option value="8">Setembro</option>
        <option value="9">Outubro</option>
        <option value="10">Novembro</option>
        <option value="11">Dezembro</option>
    </select>

    <label>Ano:</label>
    <input type="number" id="anoSelecionado" value="2026">
</div>

            <!-- PLANILHA -->
            <div class="card">
                <h3>Importar Planilha</h3>
                <input type="file" id="inputExcel" accept=".xlsx, .xls, .csv">
                <button onclick="lerPlanilha()">Carregar Planilha</button>
            </div>

            <!-- METAS -->
            <div class="card">
                <h3>Metas</h3>

                <label>Venda ano passado (R$)</label>
                <input type="text" id="anoPassado">

                <label>% Crescimento</label>
                <input type="number" id="percentual" placeholder="Ex: 10">

                <label class="check">
                    <input type="checkbox" id="abrirDomingo">
                    <span>Trabalhar aos domingos</span>
                </label>
                <label class="check">
                    <input type="checkbox" id="trabalharFeriado">
                    <span>Trabalhar em feriados</span>
                </label>

                <button onclick="calcularMeta()">Calcular Meta</button>

                <h2 id="metaResultado"></h2>
            </div>

            <!-- FUNCIONÁRIAS -->
            <div class="card">
                <h3>Funcionárias</h3>
                <div id="listaFuncionarias"></div>
                <button onclick="adicionarFuncionaria()">Adicionar Funcionária</button>
            </div>

            <!-- 🔥 VENDAS POR DIA (AGORA FULL WIDTH) -->
            <div class="card full">
                <h3>Vendas por Dia</h3>

                <label>Filtrar Funcionária</label>
                <select id="filtro" onchange="filtrarTabela()">
                    <option value="todas">Todas</option>
                </select>

                <div id="dias"></div>
            </div>

            <!-- 📦 EXPORTAÇÃO (MENOR) -->
            <div class="card small">
                <h3>Exportar Dados</h3>

                <button onclick="exportarPDF()">Exportar PDF</button>
                <button onclick="exportarExcel()">Exportar Excel</button>
            </div>

        </div>

    </main>
    </div>

    <!-- LIBS -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script src="./script.js" defer></script>
</body>

</html>
